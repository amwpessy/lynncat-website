<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>白银历史行情 · 稀赢新材</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/silver.css">
</head>
<body>
<div class="app">
  <div class="navbar" style="background:#4f46e5">
    <a class="nav-back" href="index">‹ 返回</a>
    <div class="nav-title">白银历史行情</div>
    <div class="nav-spacer"></div>
  </div>
  <div class="page">

    <div class="section-label">📊 当前白银价格</div>
    <div class="card card-silver">
      <div class="summary-grid">
        <div class="sg-item">
          <div class="sg-label">最新报价</div>
          <div class="sg-val silver" id="sPrice">—</div>
          <div class="sg-sub" id="sGram">—</div>
          <div class="sg-date" id="sDate">—</div>
        </div>
        <div class="sg-divider"></div>
        <div class="sg-item">
          <div class="sg-label">历史最高</div>
          <div class="sg-val silver" id="sAth">—</div>
          <div class="sg-date" id="sAthDate">—</div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab-item tab-active" data-tab="usd">💵 美元关口（每$10）</div>
      <div class="tab-item" data-tab="cny">🇨🇳 人民币关口（每¥1/克）</div>
    </div>

    <div data-panel="usd">
      <div class="section-label">每$10关口突破 / 跌破记录</div>
      <div class="card card-plain">
        <div class="tbl-header">
          <div class="ml-lv-col">关口</div><div class="ml-type-col">类型</div>
          <div class="ml-date-col">日期</div><div class="ml-note-col">背景</div>
        </div>
        <div id="usdList"></div>
      </div>
    </div>

    <div data-panel="cny" style="display:none">
      <div class="section-label">每¥1/克关口突破 / 跌破记录</div>
      <div class="card card-plain">
        <div class="tbl-header">
          <div class="ml-lv-col">关口</div><div class="ml-type-col">类型</div>
          <div class="ml-date-col">日期</div><div class="ml-note-col">背景</div>
        </div>
        <div id="cnyList"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">稀赢新材 · XIYINGXINCAI</div>
      <div class="footer-src">数据来源：LBMA · silverprice.org · apmex.com · sdbullion.com</div>
      <div class="footer-disc">仅供参考，不构成投资建议</div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script>window.METAL_CFG = { key: 'silver', cnyApproxFromLv: true };</script>
<script src="js/metal.js"></script>
</body>
</html>
