<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>黄金历史行情 · 灵猫数据</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/gold.css">
<link rel="stylesheet" href="css/theme.css">
<script>/* 按北京时间自动切换主题：白天(6-18)浅色，夜间深色 */
(function(){function a(){var h;try{h=parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',hour:'numeric',hour12:false}).format(new Date()),10);}catch(e){h=new Date().getHours();}if(h===24)h=0;document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark');}a();setInterval(a,300000);})();</script>
</head>
<body>
<div class="app">
  <div class="navbar">
    <a class="nav-back" href="index">‹ 返回</a>
    <div class="nav-title">黄金历史行情</div>
    <a class="nav-home" href="/">主页</a>
  </div>
  <div class="page">

    <div class="section-label">📊 当前黄金价格</div>
    <div class="card card-gold">
      <div class="summary-grid">
        <div class="sg-item">
          <div class="sg-label">最新报价</div>
          <div class="sg-val gold" id="sPrice">—</div>
          <div class="sg-sub" id="sGram">—</div>
          <div class="sg-date" id="sDate">—</div>
        </div>
        <div class="sg-divider"></div>
        <div class="sg-item">
          <div class="sg-label">历史最高</div>
          <div class="sg-val gold" id="sAth">—</div>
          <div class="sg-sub">USD/盎司</div>
          <div class="sg-date" id="sAthDate">—</div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab-item tab-active" data-tab="usd">💵 美元关口（每$100）</div>
      <div class="tab-item" data-tab="cny">🇨🇳 人民币关口（每¥100/克）</div>
    </div>

    <div data-panel="usd">
      <div class="section-label">每$100关口突破 / 跌破记录</div>
      <div class="card card-plain">
        <div class="tbl-header">
          <div class="ml-lv-col">关口</div><div class="ml-type-col">类型</div>
          <div class="ml-date-col">日期</div><div class="ml-note-col">背景</div>
        </div>
        <div id="usdList"></div>
      </div>
    </div>

    <div data-panel="cny" style="display:none">
      <div class="section-label">每¥100/克关口突破 / 跌破记录</div>
      <div class="card card-plain">
        <div class="tbl-header">
          <div class="ml-lv-col">关口</div><div class="ml-type-col">类型</div>
          <div class="ml-date-col">日期</div><div class="ml-note-col">背景</div>
        </div>
        <div id="cnyList"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">灵猫数据 · LYNNCAT</div>
      <div class="footer-src">数据来源：LBMA · goldscape.net · usagold.com · apmex.com</div>
      <div class="footer-disc">仅供参考，不构成投资建议</div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script>window.METAL_CFG = { key: 'gold', cnyApproxFromLv: false };</script>
<script src="js/metal.js"></script>
</body>
</html>
