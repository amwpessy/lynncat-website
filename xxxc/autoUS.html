<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>美国汽车销量 · 灵猫数据</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/autoUS.css">
<link rel="stylesheet" href="css/theme.css">
<script>/* 按北京时间自动切换主题：白天(6-18)浅色，夜间深色 */
(function(){function a(){var h;try{h=parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',hour:'numeric',hour12:false}).format(new Date()),10);}catch(e){h=new Date().getHours();}if(h===24)h=0;document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark');}a();setInterval(a,300000);})();</script>
</head>
<body>
<div class="app">
  <div class="navbar">
    <a class="nav-back" href="index.html">‹ 返回</a>
    <div class="nav-title">美国汽车销量</div>
    <a class="nav-home" href="../index.html">主页</a>
  </div>
  <div class="page">

    <div class="overview-card">
      <div class="ov-title">🇺🇸 美国新车销量</div>
      <div class="ov-month">2026年5月 · 更新 2026-06-02</div>
      <div class="ov-row">
        <div class="ov-item"><div class="ov-label">当月总销量</div><div class="ov-val">144万辆（预估）</div></div>
        <div class="ov-item"><div class="ov-label">同比增长</div><div class="ov-val up">+0.1% ~ +1.9%</div></div>
      </div>
      <div class="ov-note">GM/Ford/Stellantis 已切换季报，月度数据含估算值</div>
    </div>

    <div class="tab-bar">
      <div class="tab-item tab-active" data-tab="brand">🏭 厂商排名</div>
      <div class="tab-item" data-tab="model">🚗 车型排名</div>
    </div>

    <div data-panel="brand">
      <div class="tbl-wrap">
        <div class="tbl-header">
          <div class="col-rank">名次</div><div class="col-name">厂商</div>
          <div class="col-sales">销量</div><div class="col-yoy">同比</div><div class="col-mom">环比</div>
        </div>
        <div id="brandList"></div>
      </div>
    </div>

    <div data-panel="model" style="display:none">
      <div class="tbl-wrap">
        <div class="tbl-header">
          <div class="col-rank">名次</div><div class="col-model">车型</div>
          <div class="col-sales">销量</div><div class="col-yoy">同比</div><div class="col-mom">环比</div>
        </div>
        <div id="modelList"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">灵猫数据 · LYNNCAT</div>
      <div class="footer-src">数据来源：Carscoops · GoodCarBadCar · Focus2Move · CarPro</div>
      <div class="footer-disc">部分数据为估算值，仅供参考</div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script>window.AUTO_CFG = { key: 'autoUS', headerClass: '', tabActiveClass: 'tab-active' };</script>
<script src="js/auto.js"></script>
</body>
</html>
