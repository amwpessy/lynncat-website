<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>美国国债历史 · 灵猫数据</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/debt.css">
<link rel="stylesheet" href="css/theme.css">
<script>/* 按北京时间自动切换主题：白天(6-18)浅色，夜间深色 */
(function(){function a(){var h;try{h=parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',hour:'numeric',hour12:false}).format(new Date()),10);}catch(e){h=new Date().getHours();}if(h===24)h=0;document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark');}a();setInterval(a,300000);})();</script>
</head>
<body>
<div class="app">
  <div class="navbar">
    <a class="nav-back" href="index.html">‹ 返回</a>
    <div class="nav-title">美国国债历史</div>
    <a class="nav-home" href="../index.html">主页</a>
  </div>
  <div class="page">

    <div class="loading-bar" id="loadingBar">
      <div class="loading-dot"></div>
      <span class="loading-txt">加载历史数据中...</span>
    </div>

    <!-- 摘要 -->
    <div class="section-label">📊 数据摘要</div>
    <div class="card card-blue">
      <div class="summary-grid">
        <div class="sg-item">
          <div class="sg-label">最新总额</div>
          <div class="sg-val blue" id="sLatest">—</div>
          <div class="sg-date" id="sLatestDate">—</div>
        </div>
        <div class="sg-divider"></div>
        <div class="sg-item">
          <div class="sg-label">日均增加</div>
          <div class="sg-val red" id="sAvg">—</div>
          <div class="sg-date">近90天均值</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="max-row">
        <div class="max-label">单日最大增幅</div>
        <div class="max-right">
          <div class="max-val" id="sMax">—</div>
          <div class="max-date" id="sMaxDate">—</div>
        </div>
      </div>
    </div>

    <!-- 万亿里程碑 -->
    <div class="section-label">🏆 万亿突破里程碑</div>
    <div class="card card-plain">
      <div class="tbl-header">
        <div class="mil-tril-col">里程碑</div>
        <div class="mil-date-col">突破日期</div>
        <div class="mil-days-col">耗时</div>
        <div class="mil-note-col">背景</div>
      </div>
      <div id="milList"></div>
      <div class="mil-footer-note">🔴 红色 = 不足200天突破（加速阶段）</div>
    </div>

    <!-- 近90天每日 -->
    <div class="section-label">📅 近90天每日数据</div>
    <div class="card card-plain">
      <div class="tbl-header">
        <div class="day-date-col">日期</div>
        <div class="day-total-col">总额（万亿）</div>
        <div class="day-chg-col">日增量</div>
        <div class="day-pct-col">涨跌幅</div>
      </div>
      <div id="dailyList"><div class="day-empty" style="padding:14px 6px;font-size:11px;color:#94a3b8">加载中…</div></div>
    </div>

    <div class="footer">
      <div class="footer-brand">灵猫数据 · LYNNCAT</div>
      <div class="footer-src">数据来源：fiscaldata.treasury.gov</div>
      <div class="footer-disc">仅供参考，不构成投资建议</div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script src="js/debt.js"></script>
</body>
</html>
