name = "lynncat-website"
compatibility_date = "2024-01-01"
main = "src/worker.js"
assets = { directory = ".", binding = "ASSETS" }

[observability]
enabled = true

[triggers]
crons = ["0 * * * *"]

# 高考志愿填报数据库（D1）。首次部署前需创建并把 database_id 填到下方：
#   npx wrangler d1 create gkzy
# 然后用 gkzy/crawler/export_d1.py 生成的 SQL 导入：
#   npx wrangler d1 execute gkzy --remote --file gkzy/crawler/d1_import.sql
[[d1_databases]]
binding = "DB"
database_name = "gkzy"
database_id = "af6c01e7-f895-4ddf-8e35-91b246d767df"
