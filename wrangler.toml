name = "lynncat-website"
compatibility_date = "2024-01-01"
compatibility_flags = ["global_fetch_strictly_public"]
main = "src/worker.js"
assets = { directory = ".", binding = "ASSETS", run_worker_first = true }

[[d1_databases]]
binding = "DB"
database_name = "lynncat-market-community"
database_id = "775274a2-1e87-4c37-b1bf-7aac393f66a7"

[[r2_buckets]]
binding = "ITNEW_IMAGES"
bucket_name = "lynncat-itnew-images"

[observability]
enabled = true

[triggers]
crons = ["0 * * * *"]
