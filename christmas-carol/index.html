<style>
/* ===== Reset & Variables ===== */

.snow-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}.snowflake{position:absolute;color:rgba(184,134,11,.25);user-select:none;animation:fall linear infinite}@keyframes fall{to{transform:translateY(100vh) translateX(var(--drift,20px)) rotate(360deg)}}

    var s=document.createElement('div');s.className='snowflake';
    s.textContent=flakes[Math.floor(Math.random()*flakes.length)];
    s.style.left=Math.random()*100+'%';s.style.fontSize=(8+Math.random()*12)+'px';
    s.style.opacity=0.15+Math.random()*0.35;s.style.animationDuration=(10+Math.random()*16)+'s';
    s.style.animationDelay=(-Math.random()*24)+'s';s.style.setProperty('--drift',(Math.random()*50-25)+'px');
    sc.appendChild(s);
  }
}

function escapeHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var iconClasses=['i','ii','iii','iv','v'];

function buildSidebar(){
  var html='';
  D.staves.forEach(function(stave,si){
    var tzh=stave.title.zh||'',ten=stave.title.en||'';
    var roman=['I','II','III','IV','V'][si];
    html+='<div class="stave-group"><div class="stave-header" data-stave="'+si+'">';
    html+='<span class="stave-icon '+iconClasses[si]+'">'+roman+'</span><span class="arrow">▶</span>';
    html+='<span class="stave-title-text"><span class="zh">'+escapeHtml(tzh)+'</span><span class="en">'+escapeHtml(ten)+'</span></span>';
    html+='</div><div class="stave-sections" id="staveSections_'+si+'">';
    stave.sections.forEach(function(sec,seci){
      var key=si+'_'+seci;var cls='section-link'+(completed[key]?' completed':'');
      html+='<div class="'+cls+'" data-stave="'+si+'" data-section="'+seci+'"><span class="num">'+String(sec.number).padStart(2,'0')+'</span><span>小节 '+String(sec.number).padStart(2,'0')+'</span></div>';
    });
    html+='</div></div>';
  });
  sidebarContent.innerHTML=html;
  sidebarContent.querySelectorAll('.stave-header').forEach(function(el){
    el.addEventListener('click',function(){var si=+this.dataset.stave;var secEl=$('staveSections_'+si);this.classList.toggle('expanded');secEl.classList.toggle('expanded')});
  });
  sidebarContent.querySelectorAll('.section-link').forEach(function(el){
    el.addEventListener('click',function(){loadSection(+this.dataset.stave,+this.dataset.section);if(window.matchMedia&&window.matchMedia('(max-width: 768px)').matches){sidebar.classList.add('collapsed');sidebarToggle.textContent='▶'}});
  });
}

function buildSrtHtml(lang,srt){
  if(!srt||!srt.length)return'<div class="text-para">(无数据)</div>';
  var html='';var group=[];
  var sentEnd=/[。！？.!?]$/;var isZh=lang==='zh';
  for(var i=0;i<srt.length;i++){
    var t=srt[i].text.trim();if(!t)continue;
    group.push({idx:i,text:t});
    var endCue=sentEnd.test(t)||i===srt.length-1||(isZh&&group.length>=3)||(!isZh&&group.length>=4);
    if(endCue&&group.length>0){
      html+='<div class="text-para" data-lang="'+lang+'">';
      for(var k=0;k<group.length;k++){
        var sep=(k>0&&isZh)?'': (k>0?' ':'');
        html+=sep+'<span class="text-span" data-srt="'+group[k].idx+'" data-lang="'+lang+'" tabindex="0">'+escapeHtml(group[k].text)+'</span>';
      }
      html+='</div>';group=[];
    }
  }
  if(group.length>0){
    html+='<div class="text-para" data-lang="'+lang+'">';
    for(var k=0;k<group.length;k++){
      var sep=(k>0&&isZh)?'': (k>0?' ':'');
      html+=sep+'<span class="text-span" data-srt="'+group[k].idx+'" data-lang="'+lang+'" tabindex="0">'+escapeHtml(group[k].text)+'</span>';
    }
    html+='</div>';
  }
  return html;
}

function loadSection(si,seci){
  currentStave=si;currentSection=seci;
  var stave=D.staves[si];var sec=stave.sections[seci];
  welcomeScreen.style.display='none';textContainer.style.display='block';playerBar.style.display='flex';
  sectionHeader.innerHTML='<div class="stave-badge">STAVE '+stave.id.replace('Stave_','')+'</div><div class="section-num">小节 '+String(sec.number).padStart(2,'0')+'</div><div class="divider"></div>';
  var zhSrt=sec.zh.srt||[];var enSrt=sec.en.srt||[];
  var zhHtml='<div class="text-col zh-col"><h3><span class="lang-badge">中</span>中文 <span style="font-size:11px;color:var(--text3);font-weight:normal;text-transform:none;letter-spacing:0">'+zhSrt.length+'句</span></h3><div class="text-paragraphs">'+buildSrtHtml('zh',zhSrt)+'</div></div>';
  var enHtml='<div class="text-col en-col"><h3><span class="lang-badge">EN</span>English <span style="font-size:11px;color:var(--text3);font-weight:normal;text-transform:none;letter-spacing:0">'+enSrt.length+' cues</span></h3><div class="text-paragraphs">'+buildSrtHtml('en',enSrt)+'</div></div>';
  textGrid.innerHTML=zhHtml+enHtml;textGrid.className='text-grid '+viewMode;
  sidebarContent.querySelectorAll('.section-link').forEach(function(el){el.classList.toggle('active',+el.dataset.stave===si&&+el.dataset.section===seci)});
  var staveHeader=sidebarContent.querySelector('.stave-header[data-stave="'+si+'"]');var staveSecs=$('staveSections_'+si);
  if(staveHeader&&!staveHeader.classList.contains('expanded')){staveHeader.classList.add('expanded');staveSecs.classList.add('expanded')}
  var activeLink=sidebarContent.querySelector('.section-link.active');if(activeLink)activeLink.scrollIntoView({block:'nearest',behavior:'smooth'});
  loadAudio(sec);localStorage.setItem('cc_lastpos',si+'_'+seci);contentArea.scrollTop=0;
}

function loadAudio(sec){
  var src=currentLang==='zh'?sec.zh.audio:sec.en.audio;
  audioEl.src=src;audioEl.load();
  nowPlaying.textContent='Stave '+D.staves[currentStave].id.replace('Stave_','')+' · 小节 '+String(sec.number).padStart(2,'0');
  updateTimes();
}

function togglePlay(){if(!audioEl.src)return;if(audioEl.paused){audioEl.play()}else{audioEl.pause()}}

function clearTranslation(){
  textGrid.querySelectorAll('.translation-note').forEach(function(n){n.remove()});
  textGrid.querySelectorAll('.text-span.translated').forEach(function(s){s.classList.remove('translated')});
}

function getTranslation(lang, idx){
  var sec=D.staves[currentStave].sections[currentSection];
  var from=lang==='zh'?(sec.zh.srt||[]):(sec.en.srt||[]);
  var to=lang==='zh'?(sec.en.srt||[]):(sec.zh.srt||[]);
  if(!to.length)return'';
  if(to[idx])return to[idx].text;
  var mapped=from.length>1?Math.round(idx/(from.length-1)*(to.length-1)):0;
  return to[Math.max(0,Math.min(to.length-1,mapped))].text;
}

function showTranslation(span){
  var idx=+span.dataset.srt;var lang=span.dataset.lang;
  var translation=getTranslation(lang,idx);if(!translation)return;
  clearTranslation();span.classList.add('translated');
  var note=document.createElement('div');note.className='translation-note';
  note.innerHTML='<span class="label">'+(lang==='zh'?'English':'中文')+'</span>'+escapeHtml(translation);
  var para=span.closest('.text-para');if(para)para.insertAdjacentElement('afterend',note);
}

function setReadingLanguage(lang){
  if(lang!==currentLang){
    currentLang=lang;
    if(textContainer.style.display!=='none'){
      var sec=D.staves[currentStave].sections[currentSection];var wasPlaying=isPlaying;loadAudio(sec);
      if(wasPlaying)audioEl.play().catch(function(){});
    }
  }
  viewMode=lang==='zh'?'zh-only':'en-only';
  textGrid.className='text-grid '+viewMode;clearTranslation();
  document.querySelectorAll('.view-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});
  document.querySelectorAll('.lang-toggle button').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});
}

audioEl.addEventListener('play',function(){isPlaying=true;playBtn.textContent='⏸'});
audioEl.addEventListener('pause',function(){isPlaying=false;playBtn.textContent='▶'});
audioEl.addEventListener('loadedmetadata',updateTimes);
audioEl.addEventListener('timeupdate',function(){updateTimes();updateProgress();syncSubtitle()});
audioEl.addEventListener('ended',function(){
  var key=currentStave+'_'+currentSection;completed[key]=true;localStorage.setItem('cc_completed',JSON.stringify(completed));
  var link=sidebarContent.querySelector('.section-link[data-stave="'+currentStave+'"][data-section="'+currentSection+'"]');if(link)link.classList.add('completed');
  nextSection();
});

function updateTimes(){var c=audioEl.currentTime||0;var d=audioEl.duration||0;currentTimeEl.textContent=formatTime(c);totalTimeEl.textContent=formatTime(d)}
function updateProgress(){var c=audioEl.currentTime||0;var d=audioEl.duration||0;var pct=d>0?(c/d*100):0;progressFill.style.width=pct+'%'}
function formatTime(s){if(!s||isNaN(s))return'00:00';var m=Math.floor(s/60);var sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}

progressBar.addEventListener('click',function(e){var rect=progressBar.getBoundingClientRect();var pct=(e.clientX-rect.left)/rect.width;if(audioEl.duration)audioEl.currentTime=pct*audioEl.duration});

function syncSubtitle(){
  var sec=D.staves[currentStave].sections[currentSection];
  var srt=currentLang==='zh'?sec.zh.srt:sec.en.srt;if(!srt||!srt.length)return;
  var t=audioEl.currentTime;var idx=-1;
  for(var i=0;i<srt.length;i++){if(t>=srt[i].start&&t<srt[i].end){idx=i;break}}
  if(idx<0)return;
  var activeSpan=textGrid.querySelector('.text-span.active[data-lang="'+currentLang+'"]');
  var targetSpan=textGrid.querySelector('.text-span[data-srt="'+idx+'"][data-lang="'+currentLang+'"]');
  if(activeSpan===targetSpan)return;
  if(activeSpan)activeSpan.classList.remove('active');
  textGrid.querySelectorAll('.text-span.past[data-lang="'+currentLang+'"]').forEach(function(s){s.classList.remove('past')});
  if(targetSpan){
    textGrid.querySelectorAll('.text-span[data-lang="'+currentLang+'"]').forEach(function(s){
      if(+s.dataset.srt<idx)s.classList.add('past');
    });
    targetSpan.classList.add('active');
    var para=targetSpan.closest('.text-para');
    if(para)para.classList.add('has-active');
    textGrid.querySelectorAll('.text-para.has-active').forEach(function(p){if(p!==para)p.classList.remove('has-active')});
    var rect=targetSpan.getBoundingClientRect();var areaRect=contentArea.getBoundingClientRect();
    if(rect.top<areaRect.top+80||rect.bottom>areaRect.bottom-80){targetSpan.scrollIntoView({block:'center',behavior:'smooth'})}
  }
}

function nextSection(){
  var stave=D.staves[currentStave];
  if(currentSection<stave.sections.length-1){loadSection(currentStave,currentSection+1);if(isPlaying)setTimeout(function(){audioEl.play()},300)}
  else if(currentStave<D.staves.length-1){loadSection(currentStave+1,0);if(isPlaying)setTimeout(function(){audioEl.play()},300)}
  else{audioEl.pause();playBtn.textContent='▶'}
}
function prevSection(){
  if(currentSection>0)loadSection(currentStave,currentSection-1);
  else if(currentStave>0){var ps=D.staves[currentStave-1];loadSection(currentStave-1,ps.sections.length-1)}
}

playBtn.addEventListener('click',togglePlay);
$('prevBtn').addEventListener('click',prevSection);
$('nextBtn').addEventListener('click',nextSection);

document.querySelectorAll('.lang-toggle button').forEach(function(btn){
  btn.addEventListener('click',function(){setReadingLanguage(this.dataset.lang)});
});

document.querySelectorAll('.view-btn').forEach(function(btn){
  btn.addEventListener('click',function(){setReadingLanguage(this.dataset.lang)});
});

textGrid.addEventListener('click',function(e){var span=e.target.closest('.text-span');if(span&&textGrid.contains(span))showTranslation(span)});
textGrid.addEventListener('keydown',function(e){if(e.key!=='Enter'&&e.key!==' ')return;var span=e.target.closest('.text-span');if(span&&textGrid.contains(span)){e.preventDefault();showTranslation(span)}});

document.querySelectorAll('.speed-control button').forEach(function(btn){
  btn.addEventListener('click',function(){var speed=parseFloat(this.dataset.speed);audioEl.playbackRate=speed;document.querySelectorAll('.speed-control button').forEach(function(b){b.classList.toggle('active',b===btn)})});
});

sidebarToggle.addEventListener('click',function(){sidebar.classList.toggle('collapsed');this.textContent=sidebar.classList.contains('collapsed')?'▶':'◀'});

$('startBtn').addEventListener('click',function(){var last=localStorage.getItem('cc_lastpos');if(last){var parts=last.split('_');loadSection(+parts[0],+parts[1])}else{loadSection(0,0)}});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();togglePlay()}
  if(e.code==='ArrowLeft'&&!e.ctrlKey){e.preventDefault();prevSection()}
  if(e.code==='ArrowRight'&&!e.ctrlKey){e.preventDefault();nextSection()}
  if(e.code==='KeyM'){sidebar.classList.toggle('collapsed');sidebarToggle.textContent=sidebar.classList.contains('collapsed')?'▶':'◀'}
});

initSnow();buildSidebar();
if(window.matchMedia&&window.matchMedia('(max-width: 768px)').matches){sidebar.classList.add('collapsed');sidebarToggle.textContent='▶'}
setTimeout(function(){$('loadingScreen').classList.add('hidden');setTimeout(function(){$('loadingScreen').style.display='none'},500)},400);
})();
</script>
</body>
</html>
