<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="灵猫币 · 在线挖矿 — 登录即开挖，全网每秒共产出 1 枚灵猫币，由所有在线用户均分。含排行榜与转账。">
<title>灵猫币 · Lynncat Coin</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#232323;--border:#2a2a2a;
    --text:#f0f0f0;--muted:#9a9a9a;--accent:#f5a623;--accent2:#e07020;
    --up:#34d27b;--dn:#ff5a4d;--chip:rgba(255,255,255,.07);
    --shadow:0 2px 14px rgba(0,0,0,.5);
  }
  :root[data-theme='light']{
    --bg:#f6f6f8;--surface:#fff;--surface2:#f0f0f3;--border:#e3e3e8;
    --text:#1b1b1f;--muted:#6a6a72;--accent:#b35e09;--accent2:#8f4408;
    --up:#1f9d63;--dn:#cf3a28;--chip:rgba(0,0,0,.05);
    --shadow:0 2px 12px rgba(0,0,0,.06);
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 60px}
  a{color:var(--accent);text-decoration:none}

  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 4px;position:sticky;top:0;background:var(--bg);z-index:10}
  .nav .logo{font-size:18px;font-weight:800}
  .nav .home{font-size:13px;color:var(--muted);border:1px solid var(--border);background:var(--chip);padding:6px 14px;border-radius:100px}

  .hero{text-align:center;padding:18px 0 8px}
  .hero .coin{font-size:54px;line-height:1}
  .hero h1{font-size:26px;font-weight:800;margin:8px 0 4px}
  .hero p{font-size:13px;color:var(--muted)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-top:16px}
  .card h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field label{font-size:12px;color:var(--muted)}
  input{font:inherit;font-size:15px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;width:100%}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{font:inherit;font-size:15px;font-weight:600;border:none;border-radius:12px;padding:12px 18px;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .15s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:var(--chip);color:var(--text);border:1px solid var(--border)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row .btn{flex:1}
  .switch{font-size:13px;color:var(--muted);text-align:center;margin-top:12px}
  .switch a{cursor:pointer;font-weight:600}
  .msg{font-size:13px;margin-top:10px;min-height:18px}
  .msg.err{color:var(--dn)}
  .msg.ok{color:var(--up)}

  /* 挖矿面板 */
  .mine-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .me{font-size:14px;font-weight:600}
  .me .uid{color:var(--accent)}
  .logout{font-size:12px;color:var(--muted);cursor:pointer;border:1px solid var(--border);background:var(--chip);padding:5px 12px;border-radius:100px}
  .balance{font-size:44px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;margin:6px 0 2px}
  .balance .u{font-size:18px;color:var(--muted);font-weight:600;margin-left:6px}
  .stats{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:8px}
  .stats b{color:var(--text);font-weight:700}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--up);margin-right:5px;vertical-align:middle;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .rate{font-size:12px;color:var(--muted);margin-top:4px}

  /* 转账 */
  .xfer{display:flex;gap:10px;flex-wrap:wrap}
  .xfer .field{flex:1;min-width:120px;margin-bottom:0}
  .xfer .btn{align-self:flex-end;height:46px}

  /* 排行榜 */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 8px;font-size:14px;border-bottom:1px solid var(--border)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
  td.rank{width:44px;color:var(--muted);font-weight:700}
  td.rank.top{color:var(--accent)}
  td.bal{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  tr.me-row{background:rgba(245,166,35,.10)}
  .on{color:var(--up)}.off{color:var(--muted)}
  .hide{display:none}
  .foot{text-align:center;font-size:12px;color:var(--muted);margin-top:28px}
</style>
<script>/* 按北京时间自动切换主题 */
(function(){function a(){var h;try{h=parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',hour:'numeric',hour12:false}).format(new Date()),10);}catch(e){h=new Date().getHours();}if(h===24)h=0;document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark');}a();setInterval(a,300000);})();</script>
</head>
<body>
<div class="wrap">

  <div class="nav">
    <div class="logo">🐱 灵猫币</div>
    <a class="home" href="/">← 返回主页</a>
  </div>

  <div class="hero">
    <div class="coin">🪙</div>
    <h1>灵猫币 · 在线挖矿</h1>
    <p>登录即开挖 · 全网每秒共产出 <b>1</b> 枚，由当前所有在线用户均分</p>
  </div>

  <!-- 未登录：登录 / 注册 -->
  <div class="card" id="authCard">
    <h2 id="authTitle">登录</h2>
    <div class="field">
      <label>用户名（3–20 位字母/数字/下划线）</label>
      <input id="username" autocomplete="username" placeholder="例如 lynncat">
    </div>
    <div class="field">
      <label>密码（至少 6 位）</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••">
    </div>
    <button class="btn" id="authBtn" style="width:100%">登录</button>
    <div class="switch" id="authSwitch">还没有账号？<a id="toReg">注册一个</a></div>
    <div class="msg" id="authMsg"></div>
  </div>

  <!-- 已登录：挖矿面板 -->
  <div class="card hide" id="mineCard">
    <div class="mine-top">
      <div class="me">矿工 <span class="uid" id="meName">—</span></div>
      <span class="logout" id="logoutBtn">退出登录</span>
    </div>
    <div class="balance"><span id="balance">0.000000</span><span class="u">灵猫币</span></div>
    <div class="stats">
      <span><span class="dot"></span>挖矿中</span>
      <span>在线矿工 <b id="online">1</b> 人</span>
      <span>当前速率 <b id="rate">1.000000</b> /秒</span>
    </div>
    <div class="rate">在线人数越多，每人分得越少（全网总量恒定每秒 1 枚）。关闭页面即停止挖矿。</div>
  </div>

  <!-- 转账 -->
  <div class="card hide" id="xferCard">
    <h2>转账给其他矿工</h2>
    <div class="xfer">
      <div class="field"><label>收款用户名</label><input id="xferTo" placeholder="对方用户名"></div>
      <div class="field"><label>数量</label><input id="xferAmt" type="number" min="0" step="0.000001" placeholder="0"></div>
      <button class="btn" id="xferBtn">转账</button>
    </div>
    <div class="msg" id="xferMsg"></div>
  </div>

  <!-- 排行榜 -->
  <div class="card" id="lbCard">
    <h2>灵猫币排行榜 · TOP 50</h2>
    <table>
      <thead><tr><th>名次</th><th>矿工</th><th style="text-align:right">余额</th></tr></thead>
      <tbody id="lbBody"><tr><td colspan="3" style="color:var(--muted)">加载中…</td></tr></tbody>
    </table>
  </div>

  <div class="foot">灵猫数据 · LYNNCAT · 灵猫币仅供娱乐，无任何实际价值</div>

</div>

<script src="./supabase.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
