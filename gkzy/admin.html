<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>灵猫高考 · 管理员后台</title>
<link rel="stylesheet" href="css/gkzy.css">
</head>
<body data-theme="light">
<div class="wrap admin">

  <header class="hd">
    <a class="brand" href="index.html">🐱 <b>灵猫高考</b> · 管理员后台</a>
    <a class="home" href="index.html" id="logout" style="display:none">退出登录</a>
  </header>

  <!-- 登录 -->
  <section id="loginView">
    <div class="panel login-card">
      <h2>管理员登录</h2>
      <p class="sub">登录后可生成授权码、查看使用情况。</p>
      <div class="field">
        <label>账号</label>
        <input id="username" type="text" autocomplete="username" placeholder="admin">
      </div>
      <div class="field">
        <label>密码</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码">
      </div>
      <button class="btn" id="loginBtn" style="width:100%">登 录</button>
      <div id="loginMsg" class="status" style="padding:12px 0 0"></div>
    </div>
  </section>

  <!-- 后台 -->
  <section id="dashView" hidden>
    <div class="stats">
      <div class="stat"><div class="k">已生成授权码</div><div class="v" id="stTotal">—</div></div>
      <div class="stat"><div class="k">累计查询次数</div><div class="v" id="stUses">—</div></div>
    </div>

    <form class="panel gen" id="genForm">
      <div class="field"><label>生成数量</label>
        <input id="genCount" type="number" min="1" max="200" value="5"></div>
      <div class="field"><label>每码可用次数</label>
        <input id="genMax" type="number" min="1" max="1000" value="10"></div>
      <div class="field" style="flex:1;min-width:160px"><label>备注（可选）</label>
        <input id="genNote" type="text" placeholder="如：某机构 / 某客户"></div>
      <button class="btn" type="submit">生成授权码</button>
    </form>

    <div id="newCodes"></div>

    <div class="panel" style="padding:6px 16px 16px;overflow:auto;max-height:60vh">
      <table class="codes-table">
        <thead><tr>
          <th>授权码</th><th>使用情况</th><th>备注</th><th>创建时间</th><th></th>
        </tr></thead>
        <tbody id="codesBody"><tr><td colspan="5" class="empty">加载中…</td></tr></tbody>
      </table>
    </div>
  </section>

</div>
<script src="js/admin.js"></script>
</body>
</html>
